spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  flyway:
    enabled: false
  cache:
    type: none
  mail:
    host: localhost
    port: 2525
    username: test
    password: test

backup:
  api-key: test-api-key
  schedule:
    enabled: false
  output:
    type: LOCAL
    dir: ${java.io.tmpdir}/minivault-test/backups
  temp:
    dir: ${java.io.tmpdir}/minivault-test/temp
  storage:
    snapshots:
      dir: ${java.io.tmpdir}/minivault-test/snapshots

notification:
  enabled: false
  from: test@localhost
  to: admin@localhost
