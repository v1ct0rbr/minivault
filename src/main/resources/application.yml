server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: minivault
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/minivault_db}
    username: ${SPRING_DATASOURCE_USERNAME:minivault_user}
    password: ${SPRING_DATASOURCE_PASSWORD:minivault_pass}
    driver-class-name: org.postgresql.Driver
  jpa:    
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=100,expireAfterWrite=5m
  mail:
    host: ${NOTIFICATION_MAIL_HOST:}
    port: ${NOTIFICATION_MAIL_PORT:587}
    username: ${NOTIFICATION_MAIL_USERNAME:}
    password: ${NOTIFICATION_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${NOTIFICATION_MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${NOTIFICATION_MAIL_SMTP_STARTTLS:true}

backup:
  api-key: ${BACKUP_API_KEY:change-me-default-key}
  schedule:
    enabled: ${BACKUP_SCHEDULE_ENABLED:true}
    cron: ${BACKUP_SCHEDULE_CRON:0 0 2 * * ?}
  output:
    type: ${OUTPUT_STORAGE_TYPE:LOCAL}
    dir: ${OUTPUT_DIR:/tmp/backups}
  temp:
    dir: ${OUTPUT_TEMP_DIR:/tmp/backup-temp}
  storage:
    snapshots:
      dir: ${STORAGE_SNAPSHOTS_DIR:}

notification:
  enabled: ${NOTIFICATION_ENABLED:false}
  from: ${NOTIFICATION_FROM:minivault@localhost}
  to: ${NOTIFICATION_TO:admin@localhost}
  on-success: ${NOTIFICATION_ON_SUCCESS:false}
  on-failure: ${NOTIFICATION_ON_FAILURE:true}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.victorqueiroga.minivault: ${LOG_LEVEL:DEBUG}
    org.springframework.cache: TRACE
